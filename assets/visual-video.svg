<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Купольные камеры видеонаблюдения</title>
  <desc id="desc">Стилизованная иллюстрация двух купольных камер на металлической балке в изумрудной палитре сайта.</desc>
  <defs>
